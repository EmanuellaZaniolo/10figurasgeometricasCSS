<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .hexagono {
            width: 120px; /* Largura do corpo central */
            height: 69.28px; /* Altura do corpo central */
            background: #FF33A8; 
            position: relative; 
        }
        .hexagono:before, .hexagono:after {
            content: ""; 
            position: absolute; 
            left: 0; 
            width: 0; 
            border-left: 60px solid transparent; 
            border-right: 60px solid transparent; 
        }
        .hexagono:before {
            bottom: 100%; /* Posiciona o triângulo exatamente acima */
            border-bottom: 34.64px solid #FF33A8; /* Triângulo superior */
        }
        .hexagono:after {
            top: 100%; /* Posiciona o triângulo exatamente abaixo */
            border-top: 34.64px solid #FF33A8; /* Triângulo inferior */
        }
    </style>
</head>
<body>
    <div class="hexagono"></div>
</body>
</html>
