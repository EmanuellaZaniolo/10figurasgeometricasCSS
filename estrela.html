<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .estrela {
            position: relative; 
            display: block; 
            width: 0px; 
            height: 0px; 
            border-right: 100px solid transparent; 
            border-bottom: 70px solid #FFD700; /* Cor principal da estrela */
            border-left: 100px solid transparent; 
            transform: rotate(35deg); /* Rotaciona para alinhar as pontas */
        }
        .estrela:before {
            border-bottom: 80px solid #FFD700; 
            border-left: 30px solid transparent; 
            border-right: 30px solid transparent; 
            position: absolute; 
            top: -45px; 
            left: -65px; 
            content: ''; 
            transform: rotate(-35deg); /* Compensa a rotação do pai para criar pontas laterais */
        }
        .estrela:after {
            position: absolute; 
            top: 3px; 
            left: -105px; 
            border-right: 100px solid transparent; 
            border-bottom: 70px solid #FFD700; 
            border-left: 100px solid transparent; 
            transform: rotate(-70deg); /* Cria as pontas restantes da estrela */
            content: ''; 
        }
    </style>
</head>
<body>
    <div class="estrela"></div>
</body>
</html>
