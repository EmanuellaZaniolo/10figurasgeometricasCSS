<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .pacman {
            width: 0px; 
            height: 0px; 
            border-right: 70px solid transparent; /* A "boca" aberta através de transparência */
            border-top: 70px solid #F1C40F; /* Parte superior da cabeça */
            border-left: 70px solid #F1C40F; /* Lado esquerdo da cabeça */
            border-bottom: 70px solid #F1C40F; /* Parte inferior da cabeça */
            border-radius: 70px; /* Arredonda as bordas para criar o círculo */
        }
    </style>
</head>
<body>
    <div class="pacman"></div>
</body>
</html>
